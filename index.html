<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>フラットタイプカーポート 高さ計算機</title>
  <link rel="stylesheet" href="css/styles.css?v=20260620-dynamic-svg">
</head>
<body>
  <div class="app-shell">
    <header class="page-header">
      <p class="eyebrow">CARPORT HEIGHT CALCULATOR</p>
      <h1><span>フラットタイプカーポート</span><span>高さ計算機</span></h1>
      <p class="subtitle">柱間寸法と勾配から<br>柱間高低差を計算</p>
    </header>

    <main>
      <section class="calculator" aria-labelledby="calculator-title">
        <h2 id="calculator-title">入力</h2>
        <div class="input-grid">
          <label class="field">
            <span class="label-text">柱間寸法</span>
            <span class="unit">mm</span>
            <input id="spanMm" type="number" inputmode="decimal" min="0" step="1" value="2900">
          </label>

          <label class="field">
            <span class="label-text">勾配</span>
            <span class="unit">°</span>
            <input id="slopeDeg" type="number" inputmode="decimal" min="0" step="0.1" value="4">
          </label>
        </div>
      </section>

      <section class="result-panel" aria-live="polite" aria-labelledby="result-title">
        <p id="result-title" class="result-label">柱間高低差</p>
        <div class="result-value">
          <strong id="dropMm">203</strong>
          <span>mm</span>
        </div>
        <div class="summary-line">
          <span>勾配：<strong id="summarySlope">4°</strong></span>
          <span>柱間寸法：<strong id="summarySpan">2900mm</strong></span>
        </div>
      </section>

      <section class="diagram-panel" aria-labelledby="diagram-title">
        <h2 id="diagram-title">フラットタイプカーポート側面図</h2>
        <svg class="carport-diagram" viewBox="0 0 390 190" role="img" aria-labelledby="diagram-svg-title diagram-svg-desc">
          <title id="diagram-svg-title">フラットタイプカーポートの側面図</title>
          <desc id="diagram-svg-desc">水上側柱、水下側柱、屋根ライン、柱間寸法、柱間高低差を示す図</desc>

          <line x1="30" y1="156" x2="360" y2="156" class="ground-line"/>

          <line id="lowPost" x1="92" y1="98" x2="92" y2="156" class="post-line"/>
          <line id="highPost" x1="298" y1="64" x2="298" y2="156" class="post-line"/>
          <line id="roofLine" x1="70" y1="99" x2="320" y2="62" class="roof-line"/>
          <line id="roofUnderLine" x1="76" y1="112" x2="314" y2="76" class="roof-under-line"/>

          <rect id="lowBase" x="80" y="147" width="24" height="9" rx="1" class="base"/>
          <rect id="highBase" x="286" y="147" width="24" height="9" rx="1" class="base"/>

          <line id="spanLine" x1="92" y1="171" x2="298" y2="171" class="measure-line"/>
          <line id="spanLeftTick" x1="92" y1="164" x2="92" y2="178" class="measure-tick"/>
          <line id="spanRightTick" x1="298" y1="164" x2="298" y2="178" class="measure-tick"/>
          <text x="195" y="186" text-anchor="middle" class="diagram-label" id="spanLabel">柱間寸法 2900mm</text>

          <line id="dropTopGuide" x1="298" y1="72" x2="340" y2="72" class="measure-guide"/>
          <line id="dropBottomGuide" x1="92" y1="107" x2="340" y2="107" class="measure-guide"/>
          <line id="dropLine" x1="340" y1="72" x2="340" y2="107" class="height-measure"/>
          <line id="dropTopTick" x1="326" y1="72" x2="354" y2="72" class="measure-tick"/>
          <line id="dropBottomTick" x1="326" y1="107" x2="354" y2="107" class="measure-tick"/>
          <text id="dropLabel" x="336" y="92" text-anchor="end" class="diagram-label">柱間高低差 203mm</text>

          <text id="lowPostLabel" x="92" y="87" text-anchor="middle" class="post-label">水下側柱</text>
          <text id="highPostLabel" x="298" y="52" text-anchor="middle" class="post-label">水上側柱</text>
          <text id="roofLabel" x="190" y="54" text-anchor="middle" class="roof-label">屋根ライン</text>
        </svg>
      </section>
    </main>

    <footer class="notes" aria-label="注意書き">
      <p>※フラットタイプカーポート専用です</p>
      <p>※アールタイプには対応していません</p>
      <p>※特殊形状・後方支持タイプ等はメーカー図面をご確認ください</p>
      <p>※参考値です</p>
    </footer>
  </div>

  <script src="js/app.js?v=20260620-dynamic-svg"></script>
</body>
</html>
